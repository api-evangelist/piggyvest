apis:
  - aid: piggyvest:business-api
    name: PiggyVest Business API
    description: >-
      The PiggyVest Business API is a Bearer-token-authenticated REST API
      hosted at api.piggyvest.business that lets Nigerian businesses
      programmatically create and manage customers, provision customer
      wallets with reserved account numbers and accrued-interest tracking,
      move money via wallet-to-wallet and bank transfers (with name inquiry
      and bank-list lookup), retrieve transactions and statuses, schedule
      and cancel future payments, accept payments through the Pay with
      Pocket SDK, and subscribe to webhook events for real-time
      notifications. Authentication uses a secret key in the
      `Authorization: Bearer` header. The default rate limit is
      approximately 100 requests per minute. No public OpenAPI specification
      is published; integration is documented on
      www.piggyvestbusiness.com/docs and access is gated by signing up at
      dashboard.piggyvest.business/signup.
    humanURL: https://www.piggyvestbusiness.com/docs
    baseURL: https://api.piggyvest.business
