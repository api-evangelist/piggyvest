aid: piggyvest
name: PiggyVest
description: >-
  PiggyVest is a Lagos-based Nigerian fintech (operated by Piggytech Global
  Limited, RC 1405222) running the country's largest online savings and
  investment platform, with 6M+ registered users as of 2026. Founded in
  January 2016 by Somto Ifezue, Odunayo Eweniyi, and Joshua Chibueze as
  Piggybank.ng and rebranded to PiggyVest in April 2019, the company digitizes
  the traditional Nigerian "kolo" piggy-bank, layering automated savings,
  fixed-term safe-locks, naira and dollar wallets, and curated investments
  on top of licensed banking partners (originally United Bank for Africa) and
  a PCI-DSS-compliant payment stack. The consumer product family includes
  Piggybank (automated daily/weekly/monthly savings), SafeLock (fixed-tenor
  savings with up-front interest), Target Savings (goal-based saving, solo or
  group), Flex Naira (flexible wallet with free transfers), Flex Dollar /
  SafeLock Dollar (USD savings), HouseMoney (rent wallet), Investify
  (curated investment opportunities), GetIT (lifestyle purchase plans),
  Piggy Points (rewards), and an Accountability Partner feature, all
  delivered through iOS, Android, and web apps published by Piggytech
  Global. On the developer side, PiggyVest operates a separate B2B brand —
  PiggyVest Business — at piggyvest.business and exposes the PiggyVest
  Business API at api.piggyvest.business, documented at
  www.piggyvestbusiness.com/docs. The Business API is a Bearer-token
  authenticated REST API (secret key in Authorization header) covering
  customer creation and retrieval, customer wallets (create / retrieve /
  list, accrued-interest tracking, reserved account numbers, funding
  accounts), wallet-to-wallet and bank transfers (with name inquiry and
  bank lookup), transactions (status, history, T+1 settlement), scheduled
  payments (create / cancel / reactivate), webhooks for real-time event
  notifications, and a "Pay with Pocket" SDK / hosted-checkout integration
  that lets merchants accept payments funded from a Piggyvest user's Pocket
  balance. Default rate limits are approximately 100 requests per minute.
  No public OpenAPI specification, official SDK packages, or open-source
  client libraries are currently published; access is gated by signing up
  for a PiggyVest Business dashboard account. Alongside the API, PiggyVest
  Business offers Invoicing, Customizable Accounts, Business Safelock,
  Investify for Business, and business savings earning up to 18% per annum.
  Public engineering presence is limited — the Piggytech Global GitHub org
  (github.com/PiggyTech) hosts a small set of community wrappers
  (react-paystack, Smile Identity Node.js and React Native wrappers) and
  the consumer brand maintains a static piggyvest.github.io site, but
  there is no developer org publishing official Piggyvest Business SDKs.
